name: Cross-platform build test

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            rid: win-x64
            artifact: Windows-x64

          - name: Linux x64
            os: ubuntu-latest
            rid: linux-x64
            artifact: Linux-x64

          - name: macOS Intel
            os: macos-15-intel
            rid: osx-x64
            artifact: macOS-Intel

          - name: macOS Apple Silicon
            os: macos-latest
            rid: osx-arm64
            artifact: macOS-Apple-Silicon

    steps:
      - name: Download repository
        uses: actions/checkout@v6

      - name: Install .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check Python scripts
        run: python -m py_compile Scripts/Decoding.py Scripts/Encoding.py

      - name: Install PyInstaller
        run: python -m pip install pyinstaller==6.21.0

      - name: Build Python decoder
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --name Decoding
          --distpath python-dist
          Scripts/Decoding.py

      - name: Build Python encoder
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --name Encoding
          --paths Scripts
          --distpath python-dist
          Scripts/Encoding.py

      - name: Publish application
        run: >
          dotnet publish WojoPersistentEditor.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output publish/${{ matrix.rid }}

      - name: Add Python tools to application
        shell: pwsh
        run: |
          $extension = ""

          if ("${{ runner.os }}" -eq "Windows")
          {
              $extension = ".exe"
          }

          $toolsPath = "publish/${{ matrix.rid }}/Tools"

          New-Item `
              -ItemType Directory `
              -Force `
              -Path $toolsPath

          Copy-Item `
              "python-dist/Decoding$extension" `
              "$toolsPath/Decoding$extension"

          Copy-Item `
              "python-dist/Encoding$extension" `
              "$toolsPath/Encoding$extension"

      - name: Create Windows portable package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path packages

          Compress-Archive `
              -Path "publish/${{ matrix.rid }}/*" `
              -DestinationPath "packages/${{ matrix.artifact }}.zip"

      - name: Create Linux or macOS portable package
        if: runner.os != 'Windows'
        run: |
          chmod +x "publish/${{ matrix.rid }}/WojoPersistentEditor"
          chmod +x "publish/${{ matrix.rid }}/Tools/Decoding"
          chmod +x "publish/${{ matrix.rid }}/Tools/Encoding"

          mkdir -p packages

          tar -C "publish/${{ matrix.rid }}" \
            -czf "packages/${{ matrix.artifact }}.tar.gz" \
            .

      - name: Upload application package
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: packages/*
          if-no-files-found: error
